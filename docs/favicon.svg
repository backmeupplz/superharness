<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d1b"/>
      <stop offset="100%" style="stop-color:#0d0f0e"/>
    </linearGradient>
    <linearGradient id="sh-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5901e"/>
      <stop offset="100%" style="stop-color:#e8760a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg-grad)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" ry="13" fill="none" stroke="#2a2e2b" stroke-width="1"/>
  <!-- SH letters -->
  <text
    x="32" y="44"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-size="30"
    font-weight="900"
    letter-spacing="-1"
    fill="url(#sh-grad)"
  >SH</text>
  <!-- Small circuit dots for aesthetic -->
  <circle cx="8" cy="8" r="2" fill="#e8760a" opacity="0.4"/>
  <circle cx="56" cy="8" r="2" fill="#e8760a" opacity="0.4"/>
  <circle cx="8" cy="56" r="2" fill="#39d353" opacity="0.35"/>
  <circle cx="56" cy="56" r="2" fill="#39d353" opacity="0.35"/>
</svg>
